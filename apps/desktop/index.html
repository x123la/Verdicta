<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://127.0.0.1:* http://localhost:* https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verdicta</title>
  </head>
  <body class="bg-background text-foreground">
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          background:
            radial-gradient(circle at top left, rgba(148, 163, 184, 0.07), transparent 32%),
            linear-gradient(180deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0)),
            hsl(218 15% 8%);
          color: hsl(210 22% 94%);
          font-family: 'IBM Plex Sans', ui-sans-serif, system-ui;
        "
      >
        <div
          style="
            width: min(520px, 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            background: rgba(24, 28, 32, 0.86);
            padding: 28px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.3);
          "
        >
          <div style="font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(226, 232, 240, 0.65);">
            Verdicta
          </div>
          <h1 style="margin: 12px 0 0; font-size: 28px; line-height: 1.2;">Loading workspace</h1>
          <p style="margin: 12px 0 0; font-size: 14px; line-height: 1.7; color: rgba(226, 232, 240, 0.72);">
            Preparing the desktop UI. If this screen does not clear, check the launch log at
            <code>/home/lucas-alonso/Verdicta/.launcher/launch.log</code>.
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
